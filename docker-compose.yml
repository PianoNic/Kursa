services:
  # ========================
  # MoodlewareAPI Bridge
  # ========================
  moodlewareapi:
    image: moodlewareapi:local
    ports:
      - "8000:8000"
    environment:
      - MOODLE_URL=${MOODLE_URL}
      - ALLOW_ORIGINS=*
      - LOG_LEVEL=info
      - REDIS_URL=redis://redis:6379/1
      - SECRET_KEY=${MOODLEWARE_SECRET_KEY:-change_me_in_production}
    depends_on:
      - redis
    restart: unless-stopped

  # ========================
  # Backend API
  # ========================
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=kursa;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379
      - Qdrant__Host=qdrant
      - Qdrant__Port=6334
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=${MINIO_ACCESS_KEY}
      - MinIO__SecretKey=${MINIO_SECRET_KEY}
      - Moodle__BridgeUrl=http://moodlewareapi:8000
      - Llm__Provider=${LLM_PROVIDER:-openai}
      - Llm__ApiKey=${LLM_API_KEY}
      - Llm__Model=${LLM_MODEL:-gpt-4o-mini}
      - Llm__OllamaHost=${OLLAMA_HOST:-http://host.docker.internal:11434}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      moodlewareapi:
        condition: service_started
    restart: unless-stopped

  # ========================
  # PostgreSQL
  # ========================
  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=kursa
      - POSTGRES_USER=${POSTGRES_USER:-kursa}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-kursa_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kursa}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========================
  # Redis
  # ========================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ========================
  # Qdrant Vector DB
  # ========================
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ========================
  # MinIO Object Storage
  # ========================
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
